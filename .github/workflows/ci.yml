name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - oidc
          - postgres
          - wiremock
          - examples
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            go.sum
            oidc/go.sum
            postgres/go.sum
            wiremock/go.sum
            examples/go.sum
            tools/go.sum

      - name: Download tool dependencies
        working-directory: tools
        run: go mod download

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: golangci-lint
        working-directory: ${{ matrix.module }}
        run: go tool golangci-lint run ./...

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - oidc
          - postgres
          - wiremock
          - examples
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            go.sum
            oidc/go.sum
            postgres/go.sum
            wiremock/go.sum
            examples/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.module }}
        run: |
          PKGS=$(go list ./... 2>/dev/null || true)
          if [ -n "$PKGS" ]; then go build ./...; else echo "No packages to build."; fi

      - name: Test
        working-directory: ${{ matrix.module }}
        run: |
          PKGS=$(go list ./... 2>/dev/null || true)
          if [ -n "$PKGS" ]; then go test -race -coverprofile=coverage.out -coverpkg=./... ./...; else echo "No packages to test."; fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module == '.' && 'root' || matrix.module }}
          fail_ci_if_error: true
