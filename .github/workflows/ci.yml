name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ steps.filter.outputs.run-tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed files
        id: filter
        run: |
          RUN_TESTS="true"
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Pull Request event detected."
            CHANGED_FILES=$(git diff --name-only HEAD^1 HEAD) || RUN_TESTS="true"
          else
            echo "Push/Other event detected."
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || [ -z "${{ github.event.before }}" ]; then
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD) || RUN_TESTS="true"
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} HEAD) || RUN_TESTS="true"
            fi
          fi
          
          if [ "$RUN_TESTS" = "true" ]; then
            if [ -n "$CHANGED_FILES" ]; then
              echo "Changed files:"
              echo "$CHANGED_FILES"
              
              # Filter out README.md and AGENTS.md
              NON_DOC_FILES=$(echo "$CHANGED_FILES" | grep -v -E "^(README\.md|AGENTS\.md)$" || true)
              
              if [ -z "$NON_DOC_FILES" ]; then
                echo "Only README.md and/or AGENTS.md changed. Skipping build/test jobs."
                RUN_TESTS="false"
              else
                echo "Detected changes in other files:"
                echo "$NON_DOC_FILES"
                RUN_TESTS="true"
              fi
            else
              echo "No changed files detected. Running tests defensively."
              RUN_TESTS="true"
            fi
          fi
          
          echo "run-tests=$RUN_TESTS" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run-tests == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - dockerlog
          - services/oidc
          - services/postgres
          - services/wiremock
          - examples
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Cache Go Modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}
          restore-keys: |
            ${{ runner.os }}-go-mod-${{ matrix.module }}-

      - name: Cache Go Build Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}-
            ${{ runner.os }}-go-build-${{ matrix.module }}-

      - name: Download tool dependencies
        working-directory: tools
        run: go mod download

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: golangci-lint
        working-directory: ${{ matrix.module }}
        run: go tool golangci-lint run ./...

      - name: Verify dependencies are tidy
        working-directory: ${{ matrix.module }}
        run: go mod tidy -diff

  build-test:
    name: Build & Test
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run-tests == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - dockerlog
          - services/oidc
          - services/postgres
          - services/wiremock
          - examples
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Cache Go Modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}
          restore-keys: |
            ${{ runner.os }}-go-mod-${{ matrix.module }}-

      - name: Cache Go Build Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ matrix.module }}-${{ hashFiles('go.sum', format('{0}/go.sum', matrix.module)) }}-
            ${{ runner.os }}-go-build-${{ matrix.module }}-

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.module }}
        run: |
          PKGS=$(go list ./... 2>/dev/null || true)
          if [ -n "$PKGS" ]; then go build ./...; else echo "No packages to build."; fi

      - name: Test
        working-directory: ${{ matrix.module }}
        run: |
          PKGS=$(go list ./... 2>/dev/null || true)
          if [ -n "$PKGS" ]; then go test -race -coverprofile=coverage.out -coverpkg=./... ./...; else echo "No packages to test."; fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module == '.' && 'root' || matrix.module }}
          fail_ci_if_error: true

  tools:
    name: Tools
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.run-tests == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Cache Go Modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-tools-${{ hashFiles('go.sum', 'tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-tools-

      - name: Cache Go Build Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-tools-${{ hashFiles('go.sum', 'tools/go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-tools-${{ hashFiles('go.sum', 'tools/go.sum') }}-
            ${{ runner.os }}-go-build-tools-

      - name: Run tools tests
        working-directory: tools
        run: go test ./...

      - name: Vet
        working-directory: tools
        run: go vet ./...

      - name: golangci-lint
        working-directory: tools
        run: go tool golangci-lint run ./...

      - name: Verify dependencies are tidy
        working-directory: tools
        run: go mod tidy -diff
  required-checks:
    name: Required Checks
    needs: [detect-changes, lint, build-test, tools]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify dependent jobs status
        run: |
          DETECT_CHANGES_RESULT="${{ needs.detect-changes.result }}"
          LINT_RESULT="${{ needs.lint.result }}"
          BUILD_TEST_RESULT="${{ needs.build-test.result }}"
          TOOLS_RESULT="${{ needs.tools.result }}"
          
          echo "detect-changes status: $DETECT_CHANGES_RESULT"
          echo "lint status:           $LINT_RESULT"
          echo "build-test status:     $BUILD_TEST_RESULT"
          echo "tools status:          $TOOLS_RESULT"
          
          if [ "$DETECT_CHANGES_RESULT" != "success" ]; then
            echo "Error: detect-changes job failed or did not run."
            exit 1
          fi
          
          # All core check jobs must either have succeeded or been skipped.
          for job in "lint" "build-test" "tools"; do
            eval status=\${$(echo $job | tr '[:lower:]' '[:upper:]' | tr '-' '_')_RESULT}
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Error: Required check job '$job' failed, was cancelled, or did not run (status: $status)."
              exit 1
            fi
          done
          
          echo "All checks completed successfully or were skipped appropriately."
